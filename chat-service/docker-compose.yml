services:
  postgres:
    container_name: postgres
    image: postgres:17-alpine
    env_file:
      - local.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  chat-service:
    container_name: chat-service
    build:
      context: .
      target: prod
    ports:
      - "8080:8080"
    env_file:
      - local.env
    environment:
      APP_ENV: production
      DB_HOST: postgres
      RUN_MODE: server
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  bulk-upload-worker:
    container_name: bulk-upload-worker
    build:
      context: .
      target: prod
    env_file:
      - local.env
    environment:
      APP_ENV: production
      DB_HOST: postgres
      RUN_MODE: bulk-upload-worker
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
