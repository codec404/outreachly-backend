server:
  host: "0.0.0.0"
  port: "8080"
  max_request_body_bytes: 1048576  # 1 MiB
  shutdown_timeout_sec: 5
  read_timeout_sec: 10
  write_timeout_sec: 30
  idle_timeout_sec: 60
  read_header_timeout_sec: 5

db:
  pool:
    max_conns: 25
    min_conns: 2
    max_conn_idle_minutes: 30
    max_conn_lifetime_hours: 1

cors:
  allowed_origins:
    - "http://localhost:3000"
    # - "https://staging.yourdomain.com"   # uncomment for staging
    # - "https://app.yourdomain.com"       # uncomment for production

rate_limit:
  auth_rpm: 10   # requests per minute per IP on auth endpoints
  user_rpm: 120  # requests per minute per user ID on authenticated endpoints

cleanup:
  token_cleanup_hours: 6  # how often to purge expired/revoked refresh tokens

oauth:
  # Secrets (GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, GOOGLE_REDIRECT_URL) are loaded from env vars.
  state_cookie_max_age_sec: 300  # how long the CSRF state cookie lives (5 minutes)
